---
name:  JAR
title: Analysis of JAR data
jrs:   '1.1'
refs:
    - jar
    - sensominer
    - senso

items:
  - name: instructions
    title: Instructions
    visible: (tuto)
    type: Html

  - name: frequencebrut
    title: Frequency Table (Stimuli × Defects)
    type: Table
    clearWith:
      - prodeff
      - paneff
      - sensoatt
    columns: []
    
  - name: frequencebrutdes
    title: Description of the Products According to Defects
    type: Table
    columns:
      - name: product
        title: ''
        type: text
        combineBelow: true
      - name: defect
        title: Defect
        type: text
      - name: internper
        title: Intern %
        type: Number
      - name: globper
        title: Global %
        type: Number
      - name: internfreq
        title: Intern frequency
        type: Number
      - name: globfreq
        title: Global frequency
        type: Number
      - name: pvaluedfres
        title: p
        format: zto,pvalue
      - name: vtest
        title: Vtest
        type: Number
    
  - name: plotjar
    title: Representation of the Products and the Defects
    type: Image
    width: 600
    height: 500
    renderFun: .plotboth

  - name: penalty
    title: Penalties Obtained from All Defects
    type: Table
    clearWith:
      - prodeff
      - paneff
      - likvar
      - sensoatt
      - jarmod
    columns:
      - name: defect
        title: Defect
        type: text
      - name: estimate
        title: Penalty
        type: number
      - name: stderr
        title: Std. Error
        type: number
      - name: pvalue
        title: p
        format: zto,pvalue

  - name: frequence
    title: Frequencies of Defects by Product and Sensory Attribute
    type: Preformatted
    
  - name: plotpen
    title: Representation of the Penalties for Each Product 
    type: Array
    template:
      title: $key
      type: Image
      width: 600
      height: 500
      renderFun: .plotpenalty